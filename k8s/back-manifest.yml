apiVersion: apps/v1
kind: Deployment
metadata:
  name: user37-back-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user37-backend
  template:
    metadata:
      labels:
        app: user37-backend
    spec:
      containers:
        - name: user37-backend
          image: <IMAGE_URI> # CodeBuild에서 자동 치환됨
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod" # prod 프로필 활성화
            # 2. 오로라 DB 접속 주소 (본인의 오로라 DB 엔드포인트로 변경하세요!)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://user37-aurora-cluster.cluster-cqbgqrxkrfb4.us-east-1.rds.amazonaws.com:3306/bookapp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"

            # 3. 오로라 DB 접속 아이디 (보통 admin)
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"

            # 4. 오로라 DB 접속 비밀번호
            - name: SPRING_DATASOURCE_PASSWORD
              value: "12345678!"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user37-db-secret
                  key: JWT_SECRET

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20 # 자바/스프링 부트가 켜지는데 시간이 걸리므로 20초간은 검사를 유예함
            periodSeconds: 10 # 이후 10초마다 찔러봄
            failureThreshold: 3 # 3번 연속 실패하면 트래픽 차단
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30 # 완전히 켜지기 전에 섣불리 재시작하지 않도록 넉넉히 30초 대기
            periodSeconds: 15 # 이후 15초마다 찔러봄
            failureThreshold: 3 # 3번 연속 실패하면 컨테이너 강제 재시작

---
apiVersion: v1
kind: Service
metadata:
  name: user37-back-service
spec:
  type: ClusterIP # 내부 통신용으로만 개방
  selector:
    app: user37-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user37-back-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user37-back-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
