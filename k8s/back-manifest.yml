apiVersion: apps/v1
kind: Deployment
metadata:
  name: user37-back-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user37-backend
  template:
    metadata:
      labels:
        app: user37-backend
    spec:
      containers:
        - name: user37-backend
          image: <IMAGE_URI> # CodeBuild에서 자동 치환됨
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          # 💡 [핵심 추가] Secret의 데이터를 컨테이너 내부 환경변수로 매핑
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod" # prod 프로필 활성화
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: user37-db-secret
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: user37-db-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user37-db-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user37-db-secret
                  key: JWT_SECRET

          readinessProbe:
            httpGet:
              path: /books # 실제 동작하는 API 경로로 수정하세요
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user37-back-service
spec:
  type: ClusterIP # 내부 통신용으로만 개방
  selector:
    app: user37-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user37-back-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user37-back-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
